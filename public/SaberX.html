<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SaberX — Engineering Document Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  :root {
    /* light theme — neutral slate */
    --bg: #fbfbfa;
    --bg-2: #f4f4f2;
    --bg-3: #ededeb;
    --panel: #ffffff;
    --panel-2: #fafaf9;
    --line: #e8e8e5;
    --line-2: #dedcd7;
    --line-strong: #c8c5bd;
    --ink: #1a1a17;
    --ink-2: #3a3a35;
    --ink-3: #6b6b62;
    --ink-4: #9a9a8f;
    --ink-5: #bfbfb4;
    --accent: oklch(0.55 0.16 255);
    --accent-soft: oklch(0.96 0.02 255);
    --accent-ink: oklch(0.42 0.18 255);
    --green: oklch(0.62 0.14 155);
    --green-soft: oklch(0.95 0.04 155);
    --amber: oklch(0.72 0.14 75);
    --amber-soft: oklch(0.96 0.05 80);
    --red: oklch(0.6 0.18 25);
    --red-soft: oklch(0.96 0.04 25);
    --violet: oklch(0.58 0.15 295);
    --violet-soft: oklch(0.96 0.03 295);

    --row-h: 36px;
    --radius: 6px;
    --radius-lg: 10px;
    --shadow-sm: 0 1px 2px rgba(20, 20, 16, 0.04);
    --shadow-md: 0 2px 8px rgba(20, 20, 16, 0.06), 0 1px 2px rgba(20, 20, 16, 0.04);
    --shadow-lg: 0 12px 40px rgba(20, 20, 16, 0.12), 0 2px 8px rgba(20, 20, 16, 0.06);

    --font-ui: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --font-display: "Instrument Serif", "Inter", serif;
  }
  [data-theme="dark"] {
    --bg: #0e0e0d;
    --bg-2: #161614;
    --bg-3: #1d1d1a;
    --panel: #141413;
    --panel-2: #1a1a18;
    --line: #262624;
    --line-2: #2f2f2c;
    --line-strong: #3d3d39;
    --ink: #f2f1ec;
    --ink-2: #d8d7d1;
    --ink-3: #97968d;
    --ink-4: #6b6b62;
    --ink-5: #4a4a44;
    --accent: oklch(0.7 0.14 255);
    --accent-soft: oklch(0.28 0.07 255);
    --accent-ink: oklch(0.78 0.13 255);
    --green: oklch(0.72 0.14 155);
    --green-soft: oklch(0.26 0.06 155);
    --amber: oklch(0.78 0.13 75);
    --amber-soft: oklch(0.27 0.06 75);
    --red: oklch(0.72 0.16 25);
    --red-soft: oklch(0.26 0.06 25);
    --violet: oklch(0.72 0.14 295);
    --violet-soft: oklch(0.26 0.05 295);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
    --shadow-md: 0 2px 8px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.4);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.6), 0 2px 8px rgba(0,0,0,.4);
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: var(--font-ui);
    font-size: 13px;
    line-height: 1.45;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "cv11", "ss01";
  }
  button { font-family: inherit; }

  /* density */
  [data-density="compact"] { --row-h: 30px; font-size: 12.5px; }
  [data-density="comfortable"] { --row-h: 42px; font-size: 13.5px; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 8px; border: 2px solid var(--bg); background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--line-strong); border: 2px solid var(--bg); background-clip: padding-box; }

  /* generic util classes used by JSX */
  .mono { font-family: var(--font-mono); font-feature-settings: "ss02"; letter-spacing: -0.01em; }
  .kbd {
    font-family: var(--font-mono); font-size: 10.5px;
    padding: 1px 5px; border-radius: 4px;
    background: var(--bg-2); border: 1px solid var(--line);
    color: var(--ink-3);
  }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 1px 7px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
    background: var(--bg-2); color: var(--ink-2);
    border: 1px solid var(--line);
    line-height: 1.5;
    white-space: nowrap;
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill-accent { background: var(--accent-soft); color: var(--accent-ink); border-color: transparent; }
  .pill-green  { background: var(--green-soft); color: var(--green); border-color: transparent; }
  .pill-amber  { background: var(--amber-soft); color: var(--amber); border-color: transparent; }
  .pill-red    { background: var(--red-soft); color: var(--red); border-color: transparent; }
  .pill-violet { background: var(--violet-soft); color: var(--violet); border-color: transparent; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 28px; padding: 0 10px;
    border-radius: var(--radius);
    border: 1px solid var(--line-2);
    background: var(--panel);
    color: var(--ink-2);
    font-size: 12.5px; font-weight: 500;
    cursor: default;
    transition: background .12s, border-color .12s;
  }
  .btn:hover { background: var(--bg-2); border-color: var(--line-strong); }
  .btn-primary {
    background: var(--ink); color: var(--bg);
    border-color: var(--ink);
  }
  .btn-primary:hover { background: var(--ink-2); border-color: var(--ink-2); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--bg-2); }
  .btn-sm { height: 24px; padding: 0 7px; font-size: 11.5px; gap: 4px; }

  /* icons */
  .ic { width: 14px; height: 14px; flex: none; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .ic-sm { width: 12px; height: 12px; }
  .ic-lg { width: 16px; height: 16px; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>
<script type="text/babel" src="src/screen-repository.jsx"></script>
<script type="text/babel" src="src/screen-document.jsx"></script>
<script type="text/babel" src="src/screen-schema.jsx"></script>
<script type="text/babel" src="src/screen-trace.jsx"></script>
<script type="text/babel" src="src/screen-snapshots.jsx"></script>
<script type="text/babel" src="src/screen-audit.jsx"></script>
<script type="text/babel" src="src/screen-search.jsx"></script>
<script type="text/babel" src="src/screen-admin.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
