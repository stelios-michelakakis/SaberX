services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: edfsaber
      POSTGRES_USER: edfsaber
      POSTGRES_PASSWORD: edfsaber
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edfsaber -d edfsaber"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    environment:
      DATABASE_URL: postgres://edfsaber:edfsaber@postgres:5432/edfsaber
      APP_ORIGIN: https://localhost
      SESSION_COOKIE_NAME: saberx_session
      INVITATION_SECRET: change-me-before-use
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  worker:
    build: .
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: postgres://edfsaber:edfsaber@postgres:5432/edfsaber
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
